version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: nigehbaan-db
    environment:
      POSTGRES_DB: nigehbaan
      POSTGRES_USER: nigehbaan
      POSTGRES_PASSWORD: nigehbaan_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nigehbaan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nigehbaan-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nigehbaan-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nigehbaan:nigehbaan_dev@db:5432/nigehbaan
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: "http://localhost:3000"
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nigehbaan-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://nigehbaan:nigehbaan_dev@db:5432/nigehbaan
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nigehbaan-celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://nigehbaan:nigehbaan_dev@db:5432/nigehbaan
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

volumes:
  pgdata:
