name: Security Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  audit-python:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - name: Run pip audit
        id: audit
        run: |
          pip-audit -r backend/requirements.txt --output audit-results.txt 2>&1 || true
          cat audit-results.txt
      - name: Create issue on findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = '';
            try {
              results = fs.readFileSync('audit-results.txt', 'utf8');
            } catch { return; }
            if (results.includes('No known vulnerabilities found')) return;
            if (!results.trim()) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Python dependency vulnerabilities found (${new Date().toISOString().split('T')[0]})`,
              body: `## pip-audit findings\n\n\`\`\`\n${results}\n\`\`\`\n\nRun \`pip-audit -r backend/requirements.txt\` locally to review.`,
              labels: ['security'],
            });

  audit-node:
    name: Node.js Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run npm audit
        id: audit
        run: npm audit --production > audit-results.txt 2>&1 || true
      - name: Create issue on findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = '';
            try {
              results = fs.readFileSync('frontend/audit-results.txt', 'utf8');
            } catch { return; }
            if (results.includes('found 0 vulnerabilities')) return;
            if (!results.trim()) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Node.js dependency vulnerabilities found (${new Date().toISOString().split('T')[0]})`,
              body: `## npm audit findings\n\n\`\`\`\n${results.substring(0, 3000)}\n\`\`\`\n\nRun \`npm audit\` in \`frontend/\` locally to review.`,
              labels: ['security'],
            });
