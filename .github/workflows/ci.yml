name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - run: ruff check backend/ data/ tests/ --output-format=github

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npx tsc --noEmit

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev
      - run: pip install -r backend/requirements.txt
      - run: pip install -r requirements.txt 2>/dev/null || true
      - run: pip install aiosqlite  # needed for SQLite test DB

      - name: Run tests with coverage
        run: >
          pytest -m "not integration" --tb=short -q
          --cov=app --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: sqlite+aiosqlite:///test.db
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 14

      - name: Validate Alembic migrations
        continue-on-error: true
        run: |
          cd backend
          alembic upgrade head
          echo "Alembic migrations applied successfully"
        env:
          DATABASE_URL: sqlite:///ci_migration_test.db

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_MAPBOX_TOKEN: pk.placeholder

  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f Dockerfile.scraper -t nigehbaan-test .
