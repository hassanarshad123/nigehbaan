name: Deploy Backend

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/nigehbaan

            # Pull latest code
            git pull origin master

            # Write production env from secrets
            cat > .env.production <<'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=redis://redis:6379/0
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_API_BASE=${{ secrets.OPENAI_API_BASE }}
            OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
            FIRECRAWL_API_URL=${{ secrets.FIRECRAWL_API_URL }}
            FIRECRAWL_API_KEY=${{ secrets.FIRECRAWL_API_KEY }}
            EXTERNAL_JUDGMENTS_DB_URL=${{ secrets.EXTERNAL_JUDGMENTS_DB_URL }}
            S3_BUCKET=nigehbaan-data
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=ap-south-1
            MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }}
            ENVEOF

            # Stop old containers, build and deploy
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d

            # Wait for API to be healthy
            sleep 10

            # Health check
            curl -sf http://localhost:8000/health || {
              echo "Health check failed! Rolling back..."
              docker compose -f docker-compose.prod.yml logs --tail=50
              exit 1
            }

            echo "Deploy successful!"
