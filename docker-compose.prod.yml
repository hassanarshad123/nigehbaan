version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: nigehbaan-redis
    restart: unless-stopped
    expose:
      - "6379"
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: nigehbaan-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: nigehbaan-celery-worker
    restart: unless-stopped
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          memory: 768M
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --concurrency=2
      -Q celery,scraping,processing

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    container_name: nigehbaan-celery-beat
    restart: unless-stopped
    env_file:
      - .env.production
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A app.tasks.celery_app beat
      --loglevel=info
